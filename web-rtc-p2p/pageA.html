<!DOCTYPE html>
<html>
<head>
    <title>WebRTC - Page A (Text + Video)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; }
        textarea { width: 100%; height: 70px; }
        .video-container { display: flex; gap: 20px; margin-top: 15px; }
        video { width: 320px; height: 240px; background: #222; border-radius: 8px; }
        .box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
    </style>
</head>
<body>
    <h2>1. Page A (The Caller)</h2>
    
    <div class="box">
        <h3>Step 1: Turn on Video & Generate Offer</h3>
        <button id="startVideo">Click to Enable Camera & Create Code</button>
        <div class="video-container">
            <div><p>Local Video (You)</p><video id="localVideo" autoplay muted playsinline></video></div>
            <div><p>Remote Video (Page B)</p><video id="remoteVideo" autoplay playsinline></video></div>
        </div>
    </div>

    <div class="box">
        <h3>Step 2: Your Connection Code</h3>
        <textarea id="localCode" readonly placeholder="Click the button above to generate..."></textarea>
    </div>

    <div class="box">
        <h3>Step 5: Paste Response Code from Page B here</h3>
        <textarea id="remoteCode" placeholder="Paste Page B's code here..."></textarea>
        <br><br>
        <button id="connect">Step 6: Complete Connection</button>
    </div>

    <div class="box">
        <h3>P2P Chat Pipe</h3>
        <input id="messageInput" type="text" placeholder="Type a message..." disabled />
        <button id="sendButton" disabled>Send Message</button>
        <p><strong>Chat Logs:</strong></p>
        <pre id="logs" style="background: #f0f0f0; padding: 10px; max-height: 150px; overflow-y: auto;"></pre>
    </div>

    <script>
        const peerA = new RTCPeerConnection({ iceServers: [] });
        const channelA = peerA.createDataChannel("chat");

        // Handle Text Chat Connection
        channelA.onopen = () => {
            document.getElementById("messageInput").disabled = false;
            document.getElementById("sendButton").disabled = false;
            document.getElementById("logs").innerText += "CONNECTED! Text and Video channels are live.\n";
        };
        channelA.onmessage = e => document.getElementById("logs").innerText += "Received: " + e.data + "\n";

        // Handle Incoming Video Stream
        peerA.ontrack = (event) => {
            document.getElementById("remoteVideo").srcObject = event.streams[0];
        };

        document.getElementById("startVideo").onclick = async () => {
            try {
                // 1. Grab camera and microphone stream
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById("localVideo").srcObject = stream;

                // 2. Inject video/audio tracks into the P2P connection engine
                stream.getTracks().forEach(track => peerA.addTrack(track, stream));

                // 3. Collect network routing paths
                peerA.onicecandidate = e => {
                    if (!e.candidate) {
                        document.getElementById("localCode").value = JSON.stringify(peerA.localDescription);
                    }
                };

                // 4. Create standard SDP Offer
                const offer = await peerA.createOffer();
                await peerA.setLocalDescription(offer);
            } catch (err) {
                alert("Camera access denied or error: " + err.message);
            }
        };

        document.getElementById("connect").onclick = async () => {
            const answerText = document.getElementById("remoteCode").value;
            await peerA.setRemoteDescription(new RTCSessionDescription(JSON.parse(answerText)));
        };

        document.getElementById("sendButton").onclick = () => {
            const msg = document.getElementById("messageInput").value;
            channelA.send(msg);
            document.getElementById("logs").innerText += "Sent: " + msg + "\n";
            document.getElementById("messageInput").value = "";
        };
    </script>
</body>
</html>
