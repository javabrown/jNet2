<!DOCTYPE html>
<html>
<head>
    <title>WebRTC - Page A (Caller)</title>
    <style>body { font-family: sans-serif; padding: 20px; } textarea { width: 100%; height: 100px; }</style>
</head>
<body>
    <h2>1. Page A (The Caller)</h2>
    
    <button id="createOffer">Step 1: Generate Code for Page B</button>
    <h3>Your Connection Code:</h3>
    <textarea id="localCode" readonly placeholder="Click the button above to generate..."></textarea>

    <hr>

    <h3>Step 4: Paste Response Code from Page B here:</h3>
    <textarea id="remoteCode" placeholder="Paste Page B's code here..."></textarea>
    <br><br>
    <button id="connect">Step 5: Complete Connection</button>

    <hr>

    <h3>P2P Chat Pipe</h3>
    <input id="messageInput" type="text" placeholder="Type a message..." disabled />
    <button id="sendButton" disabled>Send Message</button>
    <p><strong>Chat Logs:</strong></p>
    <pre id="logs" style="background: #f0f0f0; padding: 10px;"></pre>

    <script>
        const peerA = new RTCPeerConnection({ iceServers: [] });
        const channelA = peerA.createDataChannel("chat");

        channelA.onopen = () => {
            document.getElementById("messageInput").disabled = false;
            document.getElementById("sendButton").disabled = false;
            document.getElementById("logs").innerText += "CONNECTED! You can now type messages.\n";
        };
        channelA.onmessage = e => document.getElementById("logs").innerText += "Received: " + e.data + "\n";

        document.getElementById("createOffer").onclick = async () => {
            peerA.onicecandidate = e => {
                if (!e.candidate) {
                    document.getElementById("localCode").value = JSON.stringify(peerA.localDescription);
                }
            };
            const offer = await peerA.createOffer();
            await peerA.setLocalDescription(offer);
        };

        document.getElementById("connect").onclick = async () => {
            const answerText = document.getElementById("remoteCode").value;
            await peerA.setRemoteDescription(new RTCSessionDescription(JSON.parse(answerText)));
        };

        document.getElementById("sendButton").onclick = () => {
            const msg = document.getElementById("messageInput").value;
            channelA.send(msg);
            document.getElementById("logs").innerText += "Sent: " + msg + "\n";
            document.getElementById("messageInput").value = "";
        };
    </script>
</body>
</html>
